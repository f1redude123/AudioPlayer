<!DOCTYPE html>
<html>
	<head>
    	<title>Audio Player</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <style>
        	body {
            	background:#222;
                color:#fff;
                font-family:"Roboto";
            }
        	.box {
            	width:calc(100% - 40px);
       			background:#333;
                border:1px solid #555;
                border-radius:20px;
                height:calc(100vh - 60px);
                margin:auto;
                padding:20px;
                display:flex;
                flex-direction:column;
                flex:1;
                gap:20px;
            }
            .boxChild {
            	border-radius:10px;
                background:#222;
                padding:10px;
                overflow:auto;
                height:calc(100% - 20px);
            }
            label {
                background:#33f;
                padding:5px;
                border-radius:5px;
                display:inline-block;
                height:20px;
            }
            .trackContainer {
            	display:flex;
                flex-direction:row;
                flex:1;
                align-items:center;
            }
            .lItem {
            	padding:5px;
                marign-left:0px;
            }
            .play {
            	background:#222;
                width:20px;
                height:20px;
                color:#fff;
                border:none;
                padding:2px;
                display:inline-block;
                border-radius:3px;
                margin-left:auto;
            }
            .play * {
            	font-size:15px;
            }
            .play:hover {
            	background:#333;
            }
            .control {
            	width:50px;
                height:50px;
                background:#222;
                border:none;
                color:#fff;
                font-size:35px;
                border-radius:10px;
            }
            .control:hover {
            	background:#333;
            }
            .slider {
            	width:300px;
                appearance:none;
                background:#555;
                height:5px;
                border-radius:5px;
            }
            .slider:hover {
            	background:#666;
            }
            .slider::-webkit-slider-thumb {
                appearance: none;
                width: 10px;
                height: 10px;
                background: #33f;
                cursor: pointer;
                border-radius:50%;
            }
            .slider::-moz-range-thumb {
                width: 10px;
                height: 10px;
                background: #33f;
                cursor: pointer;
                border-radius:50%;
            }
        </style>
    </head>
    <body>
    	<div class="box">
            <div class="boxChild">
            	<button class="play" onclick="filterABC();"><i class="material-icons">filter_list</i></button>
            	<div id="list"></div>
            	<label for="fUpload">+ Add files</label>
                <input type="file" onchange="addFiles(this.files);" accept=".mp3,.mpeg,.ogg,.wav" style="display:none;" id="fUpload" multiple>
            </div>
            <div class="boxChild" style="text-align:center;">
            	<h2 id="track">No audio playing</h2>
                <button class="control" onclick="skipPrev();"><i class="material-icons">skip_previous</i></button>
                <button id="playPause" class="control" onclick="playPause();"><i class="material-icons">play_arrow</i></button>
                <button class="control" onclick="skipNext();"><i class="material-icons">skip_next</i></button>
                <br>
                <input id="slider" type="range" class="slider" min="0" max="0" value="0" step="0.000001" onchange="this.currentTrack.currentTime = this.value;" disabled>
            </div>
        </div>
    </body>
    <script>
    	files = new Map();
        
        var currentTrack;
        var currentTarg = 0;
        
        document.onkeydown = function(e) {
        	if (e.key == "ArrowLeft")
            	currentTrack.currentTime -= 5;
            else if (e.key == "ArrowRight")
            	currentTrack.currentTime += 5;
        };
        
        function setTrack(name) {
        	for (var i of document.querySelectorAll("audio")) {
            	i.pause();
                i.currentTime = 0;
            }
			document.getElementById("track").textContent = name;
        	document.getElementById("playPause").firstChild.textContent = "pause";
        	currentTrack = files.get(name);
            currentTrack.play();
            document.getElementById("slider").max = currentTrack.duration;
            clearInterval(currentTarg);
            currentTarg = setInterval(function() {
                document.getElementById("slider").value = currentTrack.currentTime;
                if (currentTrack.currentTime == currentTrack.duration) {
                	document.getElementById("playPause").firstChild.textContent = "play_arrow";
                	clearInterval(currentTarg);
                }
            }, 10);
        }
        
        function skipPrev() {
        	clearInterval(currentTarg);
            setTrack(Array.from(files.keys())[(Array.from(files.values()).indexOf(currentTrack) - 1) % Array.from(files.keys()).length]);
        }
        
        function skipNext() {
        	clearInterval(currentTarg);
            setTrack(Array.from(files.keys())[(Array.from(files.values()).indexOf(currentTrack) + 1) % Array.from(files.keys()).length]);
        }
        
        function playPause() {
        	if (!currentTrack.paused) {
            	currentTrack.pause();
            } else {
            	if (currentTrack.currentTime == currentTrack.duration)
                	setTrack(files.get(Array.from(files.keys())[Array.from(files.values()).indexOf(currentTrack)]));
                else
                	currentTrack.play();
            }
            document.getElementById("playPause").firstChild.textContent = currentTrack.paused ? "play_arrow" : "pause";
        }
        
        function filterABC() {
        	files = new Map(Array.from(files).toSorted());
            refreshFiles();
        }
        
    	function refreshFiles() {
        	var list = document.getElementById("list");
        	list.innerHTML = "";
        	for (let [name, file] of files) {
            	var con = document.createElement("div");
                con.className = "trackContainer";
                
            	var small = document.createElement("small");
                small.className = "lItem";
                small.textContent = name.length < 32 ? name : name.substring(0, 29) + "...";
                
                var btn = document.createElement("button");
                btn.className = "play";
                btn.onclick = () => setTrack(name);
                
                var i = document.createElement("i");
                i.className = "material-icons";
                i.textContent = "play_arrow";
                
                btn.appendChild(i);
                
                con.appendChild(small);
                con.appendChild(btn);
                
                list.appendChild(con);
            }
        }
        
        refreshFiles();
        
        function addFiles(uFiles) {
        	for (var file of Array.from(uFiles)) {
            	var audio = new Audio(URL.createObjectURL(file));
                audio.preload = "auto";
            	files.set(file.name, audio);
            }
            refreshFiles();
        }
    </script>
</html>
